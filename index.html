<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 MimeRoue</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--white:#fff8f0;--gold:#ffce00;--pink:#ff3cac;--teal:#00f5d4;--purple:#7b2fff;}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);color:var(--white);
  font-family:'Nunito',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 60px;overflow-x:hidden;
}

/* ANIMATED BG */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 12s ease-in-out infinite;}
.orb1{width:500px;height:500px;background:rgba(123,47,255,.18);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:rgba(255,60,172,.12);bottom:-50px;right:-80px;animation-delay:-4s;}
.orb3{width:300px;height:300px;background:rgba(0,245,212,.1);top:40%;left:60%;animation-delay:-8s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-30px) scale(1.05);}66%{transform:translate(-20px,20px) scale(.95);}}

/* PARTICLES */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}

z-index wrapper
.z1{position:relative;z-index:1;}

/* HEADER */
.header{text-align:center;position:relative;z-index:1;margin-bottom:4px;}
.logo-wrap{display:inline-block;animation:logoPop .8s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes logoPop{from{opacity:0;transform:scale(.5) translateY(-20px);}to{opacity:1;transform:scale(1) translateY(0);}}
h1{
  font-family:'Bebas Neue',cursive;font-size:clamp(3.5rem,10vw,6rem);
  letter-spacing:6px;line-height:1;
  background:linear-gradient(135deg,#ff3cac 0%,#ffce00 50%,#00f5d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(255,60,172,.3));
}
.subtitle{font-size:.78rem;letter-spacing:5px;text-transform:uppercase;color:rgba(255,248,240,.3);margin-bottom:20px;}

/* DIFFICULTY BADGE */
.diff-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:20px;font-size:.75rem;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  border:none;transition:all .2s;margin-bottom:20px;
  position:relative;z-index:1;
}
.diff-badge.easy{background:rgba(0,245,212,.15);color:var(--teal);border:2px solid rgba(0,245,212,.3);}
.diff-badge.medium{background:rgba(255,206,0,.15);color:var(--gold);border:2px solid rgba(255,206,0,.3);}
.diff-badge.hard{background:rgba(255,60,172,.15);color:var(--pink);border:2px solid rgba(255,60,172,.3);}

/* STEPS */
.steps{display:flex;gap:8px;align-items:center;margin-bottom:22px;position:relative;z-index:1;}
.step{display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.2);transition:all .3s;}
.step.active{color:var(--white);}
.step.done{color:rgba(255,248,240,.4);}
.step-num{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,248,240,.12);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:.9rem;transition:all .3s;}
.step.active .step-num{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(255,206,0,.4);}
.step.done .step-num{background:var(--teal);border-color:var(--teal);color:#0a0a14;}
.step-sep{color:rgba(255,248,240,.12);}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px;position:relative;z-index:1;}
.screen.active{display:flex;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ===== SCREEN 0 – SETUP ===== */
.setup-card{
  width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);
  border-radius:24px;padding:28px;backdrop-filter:blur(12px);
  display:flex;flex-direction:column;gap:20px;
}
.setup-title{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:3px;color:rgba(255,248,240,.5);}
.team-setup{display:flex;flex-direction:column;gap:12px;}
.team-row{display:flex;gap:10px;align-items:center;}
.team-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.team-input{
  flex:1;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);
  border-radius:12px;padding:11px 16px;color:var(--white);font-family:'Nunito',sans-serif;
  font-weight:700;font-size:.95rem;outline:none;transition:all .2s;
}
.team-input:focus{border-color:var(--gold);background:rgba(255,206,0,.06);}
.rounds-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.rounds-label{font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.4);}
.round-chip{padding:7px 14px;border-radius:16px;border:2px solid rgba(255,255,255,.1);background:transparent;color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;}
.round-chip.active,.round-chip:hover{background:var(--purple);border-color:var(--purple);}
.diff-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.diff-label{font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.4);}
.diff-chip{padding:7px 16px;border-radius:16px;border:2px solid rgba(255,255,255,.1);background:transparent;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;}
.diff-chip.easy{color:var(--teal);}
.diff-chip.medium{color:var(--gold);}
.diff-chip.hard{color:var(--pink);}
.diff-chip.active.easy,.diff-chip.easy:hover{background:rgba(0,245,212,.2);border-color:var(--teal);}
.diff-chip.active.medium,.diff-chip.medium:hover{background:rgba(255,206,0,.2);border-color:var(--gold);}
.diff-chip.active.hard,.diff-chip.hard:hover{background:rgba(255,60,172,.2);border-color:var(--pink);}
.start-game-btn{
  padding:16px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:3px;
  background:linear-gradient(135deg,var(--pink),var(--purple));color:white;
  transition:all .25s;box-shadow:0 4px 30px rgba(255,60,172,.3);
}
.start-game-btn:hover{transform:translateY(-3px);box-shadow:0 8px 40px rgba(255,60,172,.5);}

/* ===== SCREEN 1 – CATEGORIES ===== */
.cat-title{font-family:'Bebas Neue',cursive;font-size:1.7rem;letter-spacing:3px;color:rgba(255,248,240,.5);margin-bottom:16px;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;width:100%;}
.cat-btn{
  padding:18px 10px;border-radius:18px;border:2px solid transparent;
  cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;
  text-align:center;transition:all .25s;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  background:rgba(255,255,255,.04);color:var(--white);backdrop-filter:blur(6px);
  position:relative;overflow:hidden;
}
.cat-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;}
.cat-btn:hover{transform:translateY(-5px) scale(1.04);}
.cat-btn:hover::before{opacity:1;}
.cat-btn .em{font-size:2rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));}
.cat-btn .nm{font-size:.78rem;letter-spacing:1px;text-transform:uppercase;}
.cat-btn .diff-indicator{font-size:.65rem;letter-spacing:1px;opacity:.6;margin-top:2px;}

/* ===== SCREEN 2 – WHEEL ===== */
.top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:16px;}
.back-btn{background:rgba(255,255,255,.07);border:none;color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;padding:9px 16px;border-radius:50px;cursor:pointer;transition:all .2s;}
.back-btn:hover{background:rgba(255,255,255,.14);}
.fullscreen-btn{background:rgba(255,255,255,.07);border:none;color:var(--white);font-size:1.1rem;width:38px;height:38px;border-radius:50%;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.fullscreen-btn:hover{background:rgba(255,255,255,.14);}

.chosen-label{font-family:'Bebas Neue',cursive;font-size:1.7rem;letter-spacing:3px;margin-bottom:18px;text-align:center;}

/* Round info */
.round-info{display:flex;gap:12px;align-items:center;margin-bottom:18px;}
.round-pill{padding:6px 16px;border-radius:20px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.5);}
.active-team-pill{padding:6px 16px;border-radius:20px;font-size:.78rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;}

/* WHEEL */
.wheel-wrapper{position:relative;width:min(360px,86vw);height:min(360px,86vw);cursor:pointer;user-select:none;}
.wheel-wrapper::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--pink),var(--gold),var(--teal),var(--purple),var(--pink));
  animation:spinBorder 4s linear infinite paused;
  opacity:.4;
}
.wheel-wrapper.spinning::before{animation-play-state:running;opacity:.8;}
@keyframes spinBorder{to{transform:rotate(360deg);}}
canvas#wheel{width:100%;height:100%;border-radius:50%;display:block;position:relative;z-index:1;}
.pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:28px solid var(--gold);filter:drop-shadow(0 4px 10px rgba(255,206,0,.9));z-index:10;}
.wheel-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:64px;height:64px;border-radius:50%;
  background:var(--bg);border:4px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:.9rem;color:var(--gold);letter-spacing:1px;
  z-index:20;pointer-events:none;box-shadow:0 0 20px rgba(255,206,0,.35);transition:all .2s;
}
.wheel-wrapper.spinning .wheel-center{background:var(--gold);color:#0a0a14;}
.spin-hint{margin-top:10px;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.25);text-align:center;}

/* RESULT */
.result-card{
  margin-top:20px;width:100%;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:22px;padding:24px 20px;text-align:center;backdrop-filter:blur(14px);
  opacity:0;transform:translateY(14px) scale(.97);
  transition:all .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
}
.result-card.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.res-lbl{font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,248,240,.3);margin-bottom:6px;}
.res-word{
  font-family:'Bebas Neue',cursive;font-size:clamp(2.8rem,9vw,4.5rem);letter-spacing:3px;line-height:1;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:wordPop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes wordPop{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
.res-actions{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.abtn{padding:10px 18px;border-radius:50px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;font-size:.84rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.abtn-new{background:var(--purple);color:white;}
.abtn-new:hover{transform:translateY(-2px);background:#8f40ff;}
.abtn-cats{background:rgba(255,255,255,.09);color:var(--white);}
.abtn-cats:hover{background:rgba(255,255,255,.16);}
.abtn-pt{background:linear-gradient(135deg,var(--teal),var(--purple));color:white;}
.abtn-pt:hover{transform:translateY(-2px);}

/* TIMER */
.time-chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:18px;}
.tc{padding:6px 13px;border-radius:16px;border:2px solid rgba(255,248,240,.1);background:transparent;color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .2s;}
.tc.active,.tc:hover{background:var(--purple);border-color:var(--purple);}
.timer-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.timer-disp{font-family:'Bebas Neue',cursive;font-size:3.2rem;color:var(--gold);letter-spacing:4px;line-height:1;text-shadow:0 0 16px rgba(255,206,0,.4);min-width:100px;text-align:center;}
.timer-disp.danger{color:var(--pink);text-shadow:0 0 26px rgba(255,60,172,.8);animation:pulse .5s ease-in-out infinite alternate;}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.06)}}
.tbtns{display:flex;gap:8px;}
.tbtn{padding:11px 18px;border-radius:50px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;transition:all .2s;}
.tbtn-s{background:var(--teal);color:#0a0a14;}
.tbtn-s:hover{transform:translateY(-2px);}
.tbtn-x{background:var(--pink);color:white;}
.tbtn-x:hover{transform:translateY(-2px);}

/* SCOREBOARD */
.scoreboard{display:flex;gap:10px;width:100%;margin-top:16px;flex-wrap:wrap;}
.tcrd{
  flex:1;min-width:120px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);
  border-radius:18px;padding:14px 10px;text-align:center;backdrop-filter:blur(6px);
  transition:all .3s;
}
.tcrd.active-turn{border-color:var(--gold);box-shadow:0 0 20px rgba(255,206,0,.2);transform:scale(1.03);}
.tcrd.winner{border-color:var(--teal);box-shadow:0 0 30px rgba(0,245,212,.3);animation:winPulse 1s ease-in-out infinite alternate;}
@keyframes winPulse{from{box-shadow:0 0 20px rgba(0,245,212,.2);}to{box-shadow:0 0 40px rgba(0,245,212,.5);}}
.tnm{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.3);margin-bottom:3px;}
.tsc{font-family:'Bebas Neue',cursive;font-size:2.5rem;line-height:1;}
.tmanche{font-size:.65rem;letter-spacing:1px;color:rgba(255,248,240,.3);margin-top:2px;}
.sbtns{display:flex;gap:6px;justify-content:center;margin-top:8px;}
.sbtn{width:30px;height:30px;border-radius:50%;border:none;font-size:1rem;font-weight:900;cursor:pointer;transition:all .15s;}
.sbtn-p{background:var(--teal);color:#0a0a14;}
.sbtn-m{background:rgba(255,255,255,.08);color:var(--white);}
.sbtn:hover{transform:scale(1.14);}

/* MANCHE indicator */
.manche-bar{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.manche-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s;}
.manche-dot.done{background:var(--teal);}
.manche-dot.current{background:var(--gold);box-shadow:0 0 8px rgba(255,206,0,.6);}

/* VICTORY SCREEN */
#screenVictory .vic-emoji{font-size:5rem;animation:victoryBounce .6s ease infinite alternate;}
@keyframes victoryBounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
#screenVictory .vic-title{font-family:'Bebas Neue',cursive;font-size:clamp(2rem,8vw,3.5rem);letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin:12px 0;}
#screenVictory .vic-winner{font-family:'Bebas Neue',cursive;font-size:clamp(2.5rem,10vw,5rem);letter-spacing:4px;text-align:center;margin-bottom:20px;}
.replay-btn{padding:16px 40px;border-radius:50px;border:none;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:3px;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;transition:all .25s;box-shadow:0 4px 30px rgba(255,60,172,.4);}
.replay-btn:hover{transform:translateY(-3px);box-shadow:0 8px 40px rgba(255,60,172,.6);}

.hidden{display:none!important;}
#confettiCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999;}

/* FULLSCREEN mode */
:fullscreen body,:fullscreen .screen{background:var(--bg);}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<canvas id="particles"></canvas>

<div class="header z1">
  <div class="logo-wrap"><h1>🎭 MimeRoue</h1></div>
  <p class="subtitle">Le jeu des mimes premium</p>
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSem6k8k_6z6deVay510PzCZuFfYXfd3y-g9DAvqN3g5ifoO6Q/viewform?usp=preview" target="_blank" style="
    display:inline-flex;align-items:center;gap:7px;
    padding:9px 20px;border-radius:50px;
    border:1.5px solid rgba(255,206,0,.35);
    background:rgba(255,206,0,.08);color:#ffce00;
    font-family:Nunito,sans-serif;font-weight:900;font-size:.82rem;
    letter-spacing:2px;text-transform:uppercase;text-decoration:none;
    transition:all .2s;margin-bottom:6px;
  " onmouseover="this.style.background='rgba(255,206,0,.2)'" onmouseout="this.style.background='rgba(255,206,0,.08)'">⭐ Laisser un avis</a>
</div>

<div class="steps z1">
  <div class="step active" id="st1"><div class="step-num" id="sn1">1</div><span>Config</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="st2"><div class="step-num" id="sn2">2</div><span>Catégorie</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="st3"><div class="step-num" id="sn3">3</div><span>Roue</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="st4"><div class="step-num" id="sn4">4</div><span>Mimer!</span></div>
</div>

<!-- SCREEN 0 – SETUP -->
<div class="screen active" id="screen0">
  <div class="setup-card">
    <div class="setup-title">⚙️ Réglages de la partie</div>

    <div class="team-setup">
      <div style="font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,248,240,.35);margin-bottom:4px;">Noms des équipes</div>
      <div class="team-row">
        <div class="team-color-dot" style="background:#ff3cac;"></div>
        <input class="team-input" id="teamName0" placeholder="Équipe 1" maxlength="20">
      </div>
      <div class="team-row">
        <div class="team-color-dot" style="background:#00f5d4;"></div>
        <input class="team-input" id="teamName1" placeholder="Équipe 2" maxlength="20">
      </div>
    </div>

    <div>
      <div class="rounds-label" style="margin-bottom:10px;">Nombre de manches</div>
      <div class="rounds-row">
        <button class="round-chip active" data-r="3">3</button>
        <button class="round-chip" data-r="5">5</button>
        <button class="round-chip" data-r="7">7</button>
        <button class="round-chip" data-r="10">10</button>
      </div>
    </div>

    <div>
      <div class="diff-label" style="margin-bottom:10px;">Difficulté</div>
      <div class="diff-row">
        <button class="diff-chip easy active" data-d="easy">😊 Facile</button>
        <button class="diff-chip medium" data-d="medium">🔥 Normal</button>
        <button class="diff-chip hard" data-d="hard">💀 Expert</button>
      </div>
    </div>

    <button class="start-game-btn" id="startGameBtn">🎮 Lancer la partie !</button>
  </div>
</div>

<!-- SCREEN 1 – CATEGORIES -->
<div class="screen" id="screen1">
  <div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:16px;">
    <p class="cat-title" id="catTurnLabel">Choisis une catégorie</p>
    <button class="back-btn" onclick="goConfig()">⚙️ Config</button>
  </div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- SCREEN 2 – WHEEL -->
<div class="screen" id="screen2">
  <div class="top-bar">
    <div style="display:flex;gap:8px;">
      <button class="back-btn" id="backBtn">← Catégories</button>
      <button class="back-btn" onclick="goConfig()">⚙️ Config</button>
    </div>
    <button class="fullscreen-btn" id="fsBtn" title="Plein écran">⛶</button>
  </div>

  <div class="round-info">
    <div class="round-pill" id="roundPill">Manche 1/3</div>
    <div class="active-team-pill" id="activePill"></div>
  </div>

  <div class="chosen-label" id="chosenLabel"></div>

  <div class="wheel-wrapper" id="wheelWrap">
    <canvas id="wheel" width="400" height="400"></canvas>
    <div class="pointer"></div>
    <div class="wheel-center" id="wCenter">SPIN</div>
  </div>
  <p class="spin-hint">Clique sur la roue pour lancer</p>

  <div class="result-card" id="resCard">
    <div class="res-lbl">À mimer</div>
    <div class="res-word" id="resWord"></div>
    <div class="res-actions">
      <button class="abtn abtn-pt" id="ptBtn">✅ Point marqué !</button>
      <button class="abtn abtn-new" id="reSpinBtn">🔄 Autre mot</button>
      <button class="abtn abtn-cats" id="changeCatBtn">← Catégories</button>
      <button class="abtn" style="background:rgba(255,255,255,.07);color:var(--white)" onclick="goConfig()">⚙️ Config</button>
    </div>
  </div>

  <div class="time-chips">
    <button class="tc active" data-t="30">30 s</button>
    <button class="tc" data-t="60">1 min</button>
    <button class="tc" data-t="90">1m30</button>
    <button class="tc" data-t="120">2 min</button>
  </div>
  <div class="timer-row">
    <div class="timer-disp" id="tDisp">00:30</div>
    <div class="tbtns">
      <button class="tbtn tbtn-s" id="tStart">▶ Go</button>
      <button class="tbtn tbtn-x hidden" id="tStop">■ Stop</button>
    </div>
  </div>

  <div class="manche-bar" id="mancheBar"></div>
  <div class="scoreboard" id="scoreboard"></div>
</div>

<!-- SCREEN VICTORY -->
<div class="screen" id="screenVictory">
  <div class="vic-emoji">🏆</div>
  <div class="vic-title">Fin de partie !</div>
  <div class="vic-winner" id="vicWinner"></div>
  <div class="scoreboard" id="scoreboardFinal" style="margin-bottom:24px;"></div>
  <button class="replay-btn" id="replayBtn">🔄 Rejouer</button>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
// ===== DATA =====
const CATS = [
  {emoji:'🐾',name:'Animaux',color:'#ff3cac',
   easy:['Lion','Pingouin','Éléphant','Singe','Girafe','Kangourou','Chat','Chien','Lapin','Grenouille'],
   medium:['Pieuvre','Flamant rose','Hérisson','Autruche','Paresseux','Koala','Chameau','Panda','Castor','Hibou'],
   hard:['Tatou','Okapi','Axolotl','Quokka','Capybara','Pangolin','Ornithorynque','Tapir','Fennec','Wombat']},
  {emoji:'🎬',name:'Films',color:'#7b2fff',
   easy:['Star Wars','Titanic','Le Roi Lion','Avatar','Shrek','Frozen','Toy Story','Coco','Jaws','Rocky'],
   medium:['Matrix','Gladiator','Inception','Forrest Gump','Jurassic Park','Interstellar','La La Land','Grease','Pulp Fiction','Fight Club'],
   hard:['Parasite','2001 Odyssée','Mulholland Drive','Rashomon','Stalker','Eraserhead','Metropolis','Ran','Synecdoche','Primer']},
  {emoji:'⚽',name:'Sports',color:'#00b4d8',
   easy:['Tennis','Natation','Boxe','Golf','Basketball','Cyclisme','Ski','Surf','Football','Judo'],
   medium:['Volleyball','Karaté','Plongée','Yoga','Escrime','Rugby','Patinage','Tir à l\'arc','Équitation','Badminton'],
   hard:['Haltérophilie','Bobsleigh','Lancer du marteau','Curling','Pentathlon','Biathlon','Slalom géant','Perche','Aquathlon','Sepak Takraw']},
  {emoji:'🍕',name:'Nourriture',color:'#ffce00',
   easy:['Pizza','Crêpe','Sushi','Hamburger','Glace','Tacos','Soupe','Salade','Omelette','Sandwich'],
   medium:['Spaghetti','Fondue','Croissant','Popcorn','Tarte','Baguette','Raclette','Churros','Ramen','Hot-dog'],
   hard:['Bouillabaisse','Osso-buco','Ceviche','Baklava','Bibimbap','Moussaka','Pho','Rendang','Shakshuka','Tiramisu']},
  {emoji:'👷',name:'Métiers',color:'#ff6b35',
   easy:['Pompier','Médecin','Pilote','Professeur','Cuisinier','Policier','Dentiste','Facteur','Boulanger','Coiffeur'],
   medium:['Astronaute','Magicien','Peintre','Plombier','Scientifique','Danseur','Architecte','Clown','Détective','Chirurgien'],
   hard:['Sommelier','Luthier','Taxidermiste','Podologue','Sténographe','Épigraphiste','Maître verrier','Artificier','Souffleur','Cartographe']},
  {emoji:'💃',name:'Actions',color:'#06d6a0',
   easy:['Dormir','Nager','Sauter','Pleurer','Rigoler','Chanter','Applaudir','Courir','Manger','Danser'],
   medium:['Peindre','Conduire','Photographier','Sculpter','Skier','Pelleter','Jongler','Jardiner','Tricoter','Cuisiner'],
   hard:['Jongler avec 5 balles','Faire du mime','Souffler du verre','Dompter un lion','Surfer une vague','Construire un igloo','Traire une vache','Manier un katana','Faire du Parkour','Tisser un tapis']},
  {emoji:'🌍',name:'Lieux',color:'#4ecdc4',
   easy:['Plage','Montagne','Forêt','École','Hôpital','Aéroport','Cinéma','Restaurant','Piscine','Jardin'],
   medium:['Tour Eiffel','Pyramides','Venise','Times Square','Grand Canyon','Taj Mahal','Colisée','Big Ben','Machu Picchu','Versailles'],
   hard:['Ngorongoro','Cappadoce','Socotra','Pamukkale','Zhangjiajie','Plitvice','Hallstatt','Reine Charlotte','Trolltunga','Antelope Canyon']},
  {emoji:'😂',name:'Émotions',color:'#f9c74f',
   easy:['Joyeux','Triste','Fatigué','Surpris','En colère','Amoureux','Effrayé','Fier','Gêné','Impatient'],
   medium:['Nostalgique','Jaloux','Déçu','Soulagé','Enthousiaste','Mélancolique','Confus','Émerveillé','Reconnaissant','Frustré'],
   hard:['Schadenfreude','Saudade','Sehnsucht','Hiraeth','Hygge','Wabi-sabi','Mono no aware','Mamihlapinatapai','Toska','Fernweh']},
];

// ===== STATE =====
let selCat=null, spinning=false, curAngle=0;
let teamNames=['Équipe 1','Équipe 2'];
let teamColors=['#ff3cac','#00f5d4'];
let scores=[0,0];
let totalRounds=3, curRound=1, curTeam=0, difficulty='easy';
let usedWords=[];
let tDur=30, tRem=30, tInt=null;

// ===== PARTICLES =====
const pc=document.getElementById('particles');
const pctx=pc.getContext('2d');
let parts=[];
function initParticles(){
  pc.width=innerWidth;pc.height=innerHeight;
  parts=Array.from({length:40},()=>mkPart());
}
function mkPart(){return{x:Math.random()*pc.width,y:Math.random()*pc.height,r:Math.random()*2+.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,alpha:Math.random()*.4+.1};}
function animParts(){
  pctx.clearRect(0,0,pc.width,pc.height);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>pc.width)p.vx*=-1;
    if(p.y<0||p.y>pc.height)p.vy*=-1;
    pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,2*Math.PI);
    pctx.fillStyle=`rgba(255,255,255,${p.alpha})`;pctx.fill();
  });
  requestAnimationFrame(animParts);
}
initParticles();animParts();
window.addEventListener('resize',initParticles);

// ===== SETUP SCREEN =====
document.querySelectorAll('.round-chip').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.round-chip').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');totalRounds=parseInt(b.dataset.r);
  });
});
document.querySelectorAll('.diff-chip').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.diff-chip').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');difficulty=b.dataset.d;
  });
});
document.getElementById('startGameBtn').addEventListener('click',()=>{
  teamNames[0]=document.getElementById('teamName0').value.trim()||'Équipe 1';
  teamNames[1]=document.getElementById('teamName1').value.trim()||'Équipe 2';
  scores=[0,0];curRound=1;curTeam=0;usedWords=[];
  buildCatGrid();renderScoreboard();renderMancheBar();
  showScreen('screen1');setStep(2);updateRoundPill();updateActivePill();
});

// ===== CATEGORY GRID =====
function buildCatGrid(){
  const grid=document.getElementById('catGrid');
  grid.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat-btn';
    b.style.cssText=`border-color:${cat.color}44;`;
    b.style.setProperty('--hc',cat.color);
    const wCount=cat[difficulty].length;
    b.innerHTML=`<span class="em">${cat.emoji}</span><span class="nm">${cat.name}</span><span class="diff-indicator">${wCount} mots</span>`;
    b.addEventListener('mouseover',()=>{b.style.background=cat.color+'22';b.style.borderColor=cat.color+'99';});
    b.addEventListener('mouseout',()=>{b.style.background='rgba(255,255,255,.04)';b.style.borderColor=cat.color+'44';});
    b.addEventListener('click',()=>pickCat(cat));
    grid.appendChild(b);
  });
  document.getElementById('catTurnLabel').innerHTML=`<span style="color:${teamColors[curTeam]}">${teamNames[curTeam]}</span> — choisis une catégorie`;
}

function pickCat(cat){
  selCat=cat;
  document.getElementById('chosenLabel').innerHTML=`${cat.emoji} <span style="color:${cat.color}">${cat.name}</span>`;
  buildWheel();
  showScreen('screen2');setStep(3);
  document.getElementById('resCard').classList.remove('show');
  curAngle=0;
}

// ===== WHEEL =====
const cv=document.getElementById('wheel');
const cx=cv.getContext('2d');
const CX=200,CY=200,R=192;

function getWords(){
  const all=selCat[difficulty];
  const avail=all.filter(w=>!usedWords.includes(w));
  return avail.length>0?avail:all; // reset if all used
}

function buildWheel(){drawWheel(curAngle);}

function drawWheel(angle){
  if(!selCat)return;
  const words=getWords(),N=Math.min(words.length,16),arc=(2*Math.PI)/N;
  const subset=words.slice(0,N);
  cx.clearRect(0,0,400,400);
  for(let i=0;i<N;i++){
    const s=angle+i*arc,e=s+arc;
    cx.beginPath();cx.moveTo(CX,CY);cx.arc(CX,CY,R,s,e);cx.closePath();
    const alpha=i%2===0?'ff':'aa';
    cx.fillStyle=selCat.color+alpha;
    cx.fill();cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=2;cx.stroke();
    cx.save();cx.translate(CX,CY);cx.rotate(s+arc/2);
    cx.textAlign='right';cx.fillStyle='#fff';
    cx.font=`bold ${N>12?11:13}px Nunito,sans-serif`;
    cx.shadowColor='rgba(0,0,0,.6)';cx.shadowBlur=4;
    const lbl=subset[i].length>14?subset[i].slice(0,13)+'…':subset[i];
    cx.fillText(lbl,R-10,5);cx.restore();
  }
  // outer glow
  cx.save();
  const g=cx.createRadialGradient(CX,CY,R-6,CX,CY,R+4);
  g.addColorStop(0,selCat.color+'66');g.addColorStop(1,'transparent');
  cx.strokeStyle=g;cx.lineWidth=12;cx.beginPath();cx.arc(CX,CY,R,0,2*Math.PI);cx.stroke();
  cx.restore();
  // center
  cx.beginPath();cx.arc(CX,CY,32,0,2*Math.PI);
  cx.fillStyle='#0a0a14';cx.fill();
  cx.strokeStyle='#ffce00';cx.lineWidth=4;cx.stroke();
}

document.getElementById('wheelWrap').addEventListener('click',()=>{
  if(spinning||!selCat)return;doSpin();
});

function doSpin(){
  spinning=true;
  document.getElementById('wheelWrap').classList.add('spinning');
  document.getElementById('wCenter').textContent='…';
  document.getElementById('resCard').classList.remove('show');
  const extra=Math.PI*2*(8+Math.random()*8);
  const startA=curAngle,t0=performance.now(),dur=4000+Math.random()*1800;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const t=Math.min((now-t0)/dur,1),a=startA+extra*ease(t);
    drawWheel(a);
    if(t<1){requestAnimationFrame(frame);}
    else{
      curAngle=a;spinning=false;
      document.getElementById('wheelWrap').classList.remove('spinning');
      document.getElementById('wCenter').textContent='SPIN';
      showResult(a);
    }
  }
  requestAnimationFrame(frame);
}

function showResult(angle){
  const words=getWords(),N=Math.min(words.length,16),arc=(2*Math.PI)/N;
  const subset=words.slice(0,N);
  const norm=((-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/arc)%N;
  const word=subset[idx];
  usedWords.push(word);
  document.getElementById('resWord').textContent=word;
  // reset animation
  const rw=document.getElementById('resWord');
  rw.style.animation='none';rw.offsetHeight;rw.style.animation='';
  document.getElementById('resCard').classList.add('show');
  setStep(4);
}

// ===== SCORE A POINT =====
document.getElementById('ptBtn').addEventListener('click',()=>{
  scores[curTeam]++;
  renderScoreboard();
  stopTimer();
  nextTurn();
});

function nextTurn(){
  document.getElementById('resCard').classList.remove('show');
  setStep(2);
  // switch team
  curTeam=(curTeam+1)%2;
  if(curTeam===0) curRound++;
  if(curRound>totalRounds){endGame();return;}
  updateRoundPill();updateActivePill();renderMancheBar();
  buildCatGrid();
  showScreen('screen1');
}

function updateRoundPill(){
  document.getElementById('roundPill').textContent=`Manche ${curRound}/${totalRounds}`;
}
function updateActivePill(){
  const p=document.getElementById('activePill');
  p.textContent=`${teamNames[curTeam]} joue`;
  p.style.background=teamColors[curTeam]+'33';
  p.style.color=teamColors[curTeam];
  p.style.border=`1.5px solid ${teamColors[curTeam]}55`;
}

// ===== END GAME =====
function endGame(){
  launchConfetti();launchConfetti();
  showScreen('screenVictory');
  const winner=scores[0]>scores[1]?teamNames[0]:scores[1]>scores[0]?teamNames[1]:'Égalité !';
  const winColor=scores[0]>scores[1]?teamColors[0]:scores[1]>scores[0]?teamColors[1]:'#ffce00';
  document.getElementById('vicWinner').innerHTML=`<span style="color:${winColor}">${winner}</span>`;
  const sf=document.getElementById('scoreboardFinal');
  sf.innerHTML='';
  [0,1].forEach(i=>{
    const d=document.createElement('div');d.className='tcrd';
    if(scores[i]>scores[1-i])d.classList.add('winner');
    d.innerHTML=`<div class="tnm">${teamNames[i]}</div><div class="tsc" style="color:${teamColors[i]}">${scores[i]}</div><div class="tmanche">pts</div>`;
    sf.appendChild(d);
  });
  setTimeout(()=>{launchConfetti();},1200);
}

document.getElementById('replayBtn').addEventListener('click',()=>{
  scores=[0,0];curRound=1;curTeam=0;usedWords=[];
  showScreen('screen0');setStep(1);
});

// ===== NAV =====
document.getElementById('backBtn').addEventListener('click',()=>{showScreen('screen1');setStep(2);buildCatGrid();});
document.getElementById('changeCatBtn').addEventListener('click',()=>{document.getElementById('resCard').classList.remove('show');showScreen('screen1');setStep(2);buildCatGrid();});
document.getElementById('reSpinBtn').addEventListener('click',()=>{
  document.getElementById('resCard').classList.remove('show');
  setStep(3);setTimeout(doSpin,300);
});

function goConfig(){stopTimer();scores=[0,0];curRound=1;curTeam=0;usedWords=[];showScreen('screen0');setStep(1);}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setStep(n){
  [1,2,3,4].forEach(i=>{
    const el=document.getElementById('st'+i),sn=document.getElementById('sn'+i);
    if(!el)return;
    el.classList.remove('active','done');
    if(i<n){el.classList.add('done');sn.textContent='✓';}
    else{sn.textContent=i;}
    if(i===n)el.classList.add('active');
  });
}

// ===== SCOREBOARD =====
function renderScoreboard(){
  const sb=document.getElementById('scoreboard');sb.innerHTML='';
  [0,1].forEach(i=>{
    const d=document.createElement('div');d.className='tcrd'+(i===curTeam?' active-turn':'');
    d.innerHTML=`<div class="tnm">${teamNames[i]}</div>
    <div class="tsc" style="color:${teamColors[i]}">${scores[i]}</div>
    <div class="tmanche">pts</div>
    <div class="sbtns">
      <button class="sbtn sbtn-p" onclick="chSc(${i},1)">+</button>
      <button class="sbtn sbtn-m" onclick="chSc(${i},-1)">−</button>
    </div>`;
    sb.appendChild(d);
  });
}
function chSc(i,d){scores[i]=Math.max(0,scores[i]+d);renderScoreboard();}

function renderMancheBar(){
  const bar=document.getElementById('mancheBar');bar.innerHTML='';
  for(let i=1;i<=totalRounds;i++){
    const dot=document.createElement('div');
    dot.className='manche-dot'+(i<curRound?' done':i===curRound?' current':'');
    bar.appendChild(dot);
  }
}

// ===== FULLSCREEN =====
document.getElementById('fsBtn').addEventListener('click',()=>{
  if(!document.fullscreenElement){document.documentElement.requestFullscreen();}
  else{document.exitFullscreen();}
});
document.addEventListener('fullscreenchange',()=>{
  document.getElementById('fsBtn').textContent=document.fullscreenElement?'✕':'⛶';
});

// ===== TIMER =====
document.querySelectorAll('.tc').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tc').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');tDur=parseInt(b.dataset.t);tRem=tDur;updTimer();stopTimer();
  });
});
function updTimer(){
  const m=Math.floor(tRem/60),s=tRem%60,el=document.getElementById('tDisp');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('danger',tRem<=10&&!!tInt);
}
function stopTimer(){
  clearInterval(tInt);tInt=null;tRem=tDur;updTimer();
  document.getElementById('tStart').classList.remove('hidden');
  document.getElementById('tStop').classList.add('hidden');
}
document.getElementById('tStart').addEventListener('click',()=>{
  if(tInt)return;
  document.getElementById('tStart').classList.add('hidden');
  document.getElementById('tStop').classList.remove('hidden');
  tInt=setInterval(()=>{tRem--;updTimer();if(tRem<=0){stopTimer();launchConfetti();}},1000);
});
document.getElementById('tStop').addEventListener('click',stopTimer);
updTimer();

// ===== CONFETTI =====
const cc=document.getElementById('confettiCanvas'),cctx=cc.getContext('2d');
let conf=[];
function launchConfetti(){
  cc.width=innerWidth;cc.height=innerHeight;
  conf=[...conf,...Array.from({length:160},()=>({
    x:Math.random()*cc.width,y:-20,r:Math.random()*9+4,
    color:['#ff3cac','#ffce00','#00f5d4','#7b2fff','#06d6a0','#ff6b35'][Math.floor(Math.random()*6)],
    vx:(Math.random()-.5)*6,vy:Math.random()*6+2,angle:Math.random()*360,spin:(Math.random()-.5)*10,
  }))];
  animConf();
}
function animConf(){
  cctx.clearRect(0,0,cc.width,cc.height);
  conf=conf.filter(p=>p.y<cc.height+30);
  conf.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;
    cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.angle*Math.PI/180);
    cctx.fillStyle=p.color;cctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.5);
    cctx.restore();
  });
  if(conf.length)requestAnimationFrame(animConf);
}
</script>

</body>
