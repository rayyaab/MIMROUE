<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 MimeRoue</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f1a; --white:#fff8f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--white);
    font-family:'Nunito',sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 50px; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(100,60,255,.22) 0%,transparent 60%);
    pointer-events:none;
  }
  h1 {
    font-family:'Bebas Neue',cursive; font-size:clamp(3rem,9vw,5.5rem);
    letter-spacing:5px;
    background:linear-gradient(135deg,#ff3cac,#ffce00);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    position:relative; z-index:1;
  }
  .subtitle {
    font-size:.82rem; letter-spacing:4px; text-transform:uppercase;
    color:rgba(255,248,240,.35); margin-bottom:26px; z-index:1; position:relative;
  }

  /* STEPS */
  .steps { display:flex; gap:10px; align-items:center; margin-bottom:26px; z-index:1; position:relative; }
  .step { display:flex; align-items:center; gap:7px; font-size:.78rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,248,240,.25); transition:color .3s; }
  .step.active { color:var(--white); }
  .step.done { color:rgba(255,248,240,.4); }
  .step-num { width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,248,240,.15); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',cursive; font-size:.95rem; transition:all .3s; }
  .step.active .step-num { border-color:#ffce00; color:#ffce00; }
  .step.done .step-num { background:#00f5d4; border-color:#00f5d4; color:#0f0f1a; }
  .step-sep { color:rgba(255,248,240,.15); }

  /* SCREENS */
  .screen { display:none; flex-direction:column; align-items:center; width:100%; max-width:680px; z-index:1; position:relative; }
  .screen.active { display:flex; }

  /* SCREEN 1 – Categories */
  .cat-title { font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:3px; color:rgba(255,248,240,.55); margin-bottom:18px; }
  .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:13px; width:100%; }
  .cat-btn {
    padding:20px 12px; border-radius:18px; border:2px solid transparent;
    cursor:pointer; font-family:'Nunito',sans-serif; font-weight:900; font-size:.95rem;
    text-align:center; transition:all .2s;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    background:rgba(255,255,255,.05); color:var(--white); backdrop-filter:blur(6px);
  }
  .cat-btn:hover { transform:translateY(-4px) scale(1.03); }
  .cat-btn .em { font-size:2.1rem; }
  .cat-btn .nm { font-size:.82rem; letter-spacing:1px; text-transform:uppercase; }

  /* SCREEN 2 – Wheel */
  .back-btn {
    align-self:flex-start; background:rgba(255,255,255,.07); border:none;
    color:var(--white); font-family:'Nunito',sans-serif; font-weight:700;
    font-size:.82rem; letter-spacing:2px; text-transform:uppercase;
    padding:9px 18px; border-radius:50px; cursor:pointer; transition:all .2s; margin-bottom:18px;
  }
  .back-btn:hover { background:rgba(255,255,255,.14); }
  .chosen-label { font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:3px; margin-bottom:22px; text-align:center; }

  .wheel-wrapper {
    position:relative; width:min(370px,88vw); height:min(370px,88vw);
    cursor:pointer; user-select:none;
  }
  canvas#wheel { width:100%; height:100%; border-radius:50%; transition:filter .3s; display:block; }
  .pointer {
    position:absolute; top:-15px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:13px solid transparent; border-right:13px solid transparent;
    border-top:30px solid #ffce00; filter:drop-shadow(0 4px 8px rgba(255,206,0,.8)); z-index:10;
  }
  .wheel-center {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:68px; height:68px; border-radius:50%;
    background:var(--bg); border:4px solid #ffce00;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',cursive; font-size:.95rem; color:#ffce00; letter-spacing:1px;
    z-index:20; pointer-events:none; box-shadow:0 0 18px rgba(255,206,0,.3); transition:all .2s;
  }
  .wheel-wrapper.spinning .wheel-center { background:#ffce00; color:#0f0f1a; }
  .spin-hint { margin-top:12px; font-size:.78rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,248,240,.3); text-align:center; }

  /* RESULT */
  .result-card {
    margin-top:24px; width:100%;
    background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.1);
    border-radius:22px; padding:26px 22px; text-align:center; backdrop-filter:blur(12px);
    opacity:0; transform:translateY(14px);
    transition:opacity .5s, transform .5s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  .result-card.show { opacity:1; transform:translateY(0); pointer-events:auto; }
  .res-lbl { font-size:.72rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,248,240,.35); margin-bottom:8px; }
  .res-word {
    font-family:'Bebas Neue',cursive; font-size:clamp(2.8rem,9vw,4.2rem); letter-spacing:3px; line-height:1.1;
    background:linear-gradient(135deg,#00f5d4,#ffce00);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .res-actions { display:flex; gap:11px; justify-content:center; margin-top:15px; flex-wrap:wrap; }
  .abtn { padding:11px 20px; border-radius:50px; border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:900; font-size:.88rem; letter-spacing:1px; text-transform:uppercase; transition:all .2s; }
  .abtn-new { background:#7b2fff; color:white; }
  .abtn-new:hover { transform:translateY(-2px); background:#8f40ff; }
  .abtn-cats { background:rgba(255,255,255,.1); color:var(--white); }
  .abtn-cats:hover { background:rgba(255,255,255,.17); }

  /* TIMER */
  .time-chips { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:22px; }
  .tc { padding:7px 14px; border-radius:20px; border:2px solid rgba(255,248,240,.12); background:transparent; color:var(--white); font-family:'Nunito',sans-serif; font-weight:700; font-size:.83rem; cursor:pointer; transition:all .2s; }
  .tc.active,.tc:hover { background:#7b2fff; border-color:#7b2fff; }
  .timer-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:14px; }
  .timer-disp { font-family:'Bebas Neue',cursive; font-size:3.4rem; color:#ffce00; letter-spacing:4px; line-height:1; text-shadow:0 0 18px rgba(255,206,0,.4); min-width:106px; text-align:center; }
  .timer-disp.danger { color:#ff3cac; text-shadow:0 0 28px rgba(255,60,172,.8); animation:pulse .5s ease-in-out infinite alternate; }
  @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.06)} }
  .tbtns { display:flex; gap:9px; }
  .tbtn { padding:11px 18px; border-radius:50px; border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:900; font-size:.88rem; transition:all .2s; }
  .tbtn-s { background:#00f5d4; color:#0f0f1a; }
  .tbtn-s:hover { transform:translateY(-2px); }
  .tbtn-x { background:#ff3cac; color:white; }
  .tbtn-x:hover { transform:translateY(-2px); }
  .hidden { display:none!important; }

  /* SCORES */
  .scoreboard { display:flex; gap:11px; width:100%; margin-top:18px; }
  .tcrd { flex:1; background:rgba(255,255,255,.05); border:2px solid rgba(255,255,255,.08); border-radius:17px; padding:13px; text-align:center; backdrop-filter:blur(6px); }
  .tnm { font-size:.68rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,248,240,.35); margin-bottom:4px; }
  .tsc { font-family:'Bebas Neue',cursive; font-size:2.7rem; color:#ffce00; line-height:1; }
  .sbtns { display:flex; gap:7px; justify-content:center; margin-top:7px; }
  .sbtn { width:31px; height:31px; border-radius:50%; border:none; font-size:1.1rem; font-weight:900; cursor:pointer; transition:all .15s; }
  .sbtn-p { background:#00f5d4; color:#0f0f1a; }
  .sbtn-m { background:rgba(255,255,255,.09); color:var(--white); }
  .sbtn:hover { transform:scale(1.12); }

  #confettiCanvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:999; }
</style>
</head>
<body>

<h1>🎭 MimeRoue</h1>
<p class="subtitle">Le jeu des mimes</p>

<div class="steps">
  <div class="step active" id="st1"><div class="step-num" id="sn1">1</div><span>Catégorie</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="st2"><div class="step-num" id="sn2">2</div><span>Roue</span></div>
  <div class="step-sep">›</div>
  <div class="step" id="st3"><div class="step-num" id="sn3">3</div><span>Mimer !</span></div>
</div>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <p class="cat-title">Choisis une catégorie</p>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <button class="back-btn" id="backBtn">← Changer de catégorie</button>
  <div class="chosen-label" id="chosenLabel"></div>

  <div class="wheel-wrapper" id="wheelWrap">
    <canvas id="wheel" width="420" height="420"></canvas>
    <div class="pointer"></div>
    <div class="wheel-center" id="wCenter">SPIN</div>
  </div>
  <p class="spin-hint">Clique sur la roue pour lancer</p>

  <div class="result-card" id="resCard">
    <div class="res-lbl">À mimer</div>
    <div class="res-word" id="resWord"></div>
    <div class="res-actions">
      <button class="abtn abtn-new" id="reSpinBtn">🔄 Autre mot</button>
      <button class="abtn abtn-cats" id="changeCatBtn">← Catégories</button>
    </div>
  </div>

  <div class="time-chips">
    <button class="tc active" data-t="30">30 s</button>
    <button class="tc" data-t="60">1 min</button>
    <button class="tc" data-t="90">1 m 30</button>
    <button class="tc" data-t="120">2 min</button>
  </div>
  <div class="timer-row">
    <div class="timer-disp" id="tDisp">00:30</div>
    <div class="tbtns">
      <button class="tbtn tbtn-s" id="tStart">▶ Go</button>
      <button class="tbtn tbtn-x hidden" id="tStop">■ Stop</button>
    </div>
  </div>

  <div class="scoreboard">
    <div class="tcrd">
      <div class="tnm">Équipe 1</div>
      <div class="tsc" id="sc0">0</div>
      <div class="sbtns">
        <button class="sbtn sbtn-p" onclick="chSc(0,1)">+</button>
        <button class="sbtn sbtn-m" onclick="chSc(0,-1)">−</button>
      </div>
    </div>
    <div class="tcrd">
      <div class="tnm">Équipe 2</div>
      <div class="tsc" id="sc1">0</div>
      <div class="sbtns">
        <button class="sbtn sbtn-p" onclick="chSc(1,1)">+</button>
        <button class="sbtn sbtn-m" onclick="chSc(1,-1)">−</button>
      </div>
    </div>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
const CATS = [
  {emoji:'🐾',name:'Animaux',  color:'#ff3cac',words:['Lion','Pingouin','Éléphant','Singe','Girafe','Kangourou','Pieuvre','Flamant rose','Hérisson','Autruche','Requin','Serpent','Paresseux','Koala','Chameau','Panda','Perroquet','Méduse','Castor','Hibou']},
  {emoji:'🎬',name:'Films',    color:'#7b2fff',words:['Star Wars','Titanic','Le Roi Lion','Avatar','Matrix','Gladiator','Inception','Forrest Gump','Jurassic Park','Spider-Man','Interstellar','La La Land','Coco','Frozen','Shrek','Rocky','Jaws','Toy Story','Grease','Pulp Fiction']},
  {emoji:'⚽',name:'Sports',   color:'#00b4d8',words:['Tennis','Natation','Boxe','Ski alpin','Golf','Basketball','Volleyball','Cyclisme','Karaté','Plongée','Yoga','Escrime','Rugby','Patinage','Surf','Judo','Tir à l\'arc','Équitation','Haltérophilie','Badminton']},
  {emoji:'🍕',name:'Nourriture',   color:'#ffce00',words:['Pizza','Spaghetti','Crêpe','Sushi','Hamburger','Fondue','Croissant','Salade','Popcorn','Glace','Omelette','Soupe','Tarte','Tacos','Baguette','Raclette','Churros','Ramen','Hot-dog','Waffle']},
  {emoji:'👷',name:'Métiers',  color:'#ff6b35',words:['Pompier','Astronaute','Chef cuisinier','Médecin','Magicien','Peintre','Plombier','Pilote','Scientifique','Danseur','Architecte','Clown','Professeur','Détective','Chirurgien','DJ','Agent secret','Boxeur','Livreur','Coiffeur']},
  {emoji:'💃',name:'Actions',  color:'#06d6a0',words:['Dormir','Nager','Sauter','Pleurer','Rigoler','Peindre','Conduire','Photographier','Chanter','Sculpter','Skier','Applaudir','Pelleter','Jongler','Escalader','Tricoter','Jardiner','Faire du vélo','Se coiffer','Cuisiner']},
];

let selCat = null, spinning = false, curAngle = 0;
let scores = [0,0];
let tDur = 30, tRem = 30, tInt = null;

// Build category grid
const grid = document.getElementById('catGrid');
CATS.forEach(cat => {
  const b = document.createElement('button');
  b.className = 'cat-btn';
  b.style.cssText = `border-color:${cat.color}55;background:${cat.color}18;`;
  b.innerHTML = `<span class="em">${cat.emoji}</span><span class="nm">${cat.name}</span>`;
  b.addEventListener('click', () => pickCat(cat));
  grid.appendChild(b);
});

function pickCat(cat) {
  selCat = cat;
  document.getElementById('chosenLabel').innerHTML = `${cat.emoji} <span style="color:${cat.color}">${cat.name}</span>`;
  buildWheel();
  showScreen('screen2');
  setStep(2);
  document.getElementById('resCard').classList.remove('show');
  curAngle = 0;
}

// WHEEL
const cv = document.getElementById('wheel');
const cx = cv.getContext('2d');
const CX=210,CY=210,R=200;

function buildWheel() { drawWheel(curAngle); }

function drawWheel(angle) {
  if (!selCat) return;
  const words = selCat.words, N = words.length, arc = (2*Math.PI)/N;
  cx.clearRect(0,0,420,420);
  for (let i=0;i<N;i++) {
    const s = angle+i*arc, e = s+arc;
    cx.beginPath(); cx.moveTo(CX,CY); cx.arc(CX,CY,R,s,e); cx.closePath();
    cx.fillStyle = i%2===0 ? selCat.color : selCat.color+'99';
    cx.fill();
    cx.strokeStyle='rgba(0,0,0,.25)'; cx.lineWidth=2; cx.stroke();
    cx.save(); cx.translate(CX,CY); cx.rotate(s+arc/2);
    cx.textAlign='right'; cx.fillStyle='#fff';
    cx.font=`bold ${N>15?11:13}px Nunito,sans-serif`;
    cx.shadowColor='rgba(0,0,0,.6)'; cx.shadowBlur=4;
    const lbl = words[i].length>15 ? words[i].slice(0,14)+'…' : words[i];
    cx.fillText(lbl,R-10,5); cx.restore();
  }
  // glow ring
  cx.save();
  const grad = cx.createRadialGradient(CX,CY,R-8,CX,CY,R+2);
  grad.addColorStop(0,selCat.color+'88'); grad.addColorStop(1,'transparent');
  cx.strokeStyle=grad; cx.lineWidth=10; cx.beginPath(); cx.arc(CX,CY,R,0,2*Math.PI); cx.stroke();
  cx.restore();
  // center
  cx.beginPath(); cx.arc(CX,CY,34,0,2*Math.PI);
  cx.fillStyle='#0f0f1a'; cx.fill();
  cx.strokeStyle='#ffce00'; cx.lineWidth=4; cx.stroke();
}

document.getElementById('wheelWrap').addEventListener('click', () => {
  if (spinning || !selCat) return;
  doSpin();
});

function doSpin() {
  spinning=true;
  document.getElementById('wheelWrap').classList.add('spinning');
  document.getElementById('wCenter').textContent='…';
  const extra = Math.PI*2*(7+Math.random()*8);
  const startA = curAngle, t0 = performance.now();
  const dur = 4200+Math.random()*1600;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    const a=startA+extra*ease(t);
    drawWheel(a);
    if(t<1){requestAnimationFrame(frame);}
    else{
      curAngle=a; spinning=false;
      document.getElementById('wheelWrap').classList.remove('spinning');
      document.getElementById('wCenter').textContent='SPIN';
      showResult(a);
    }
  }
  requestAnimationFrame(frame);
}

function showResult(angle){
  const N=selCat.words.length, arc=(2*Math.PI)/N;
  const norm=((-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/arc)%N;
  document.getElementById('resWord').textContent=selCat.words[idx];
  document.getElementById('resCard').classList.add('show');
  setStep(3);
}

// Nav
document.getElementById('backBtn').addEventListener('click',goBack);
document.getElementById('changeCatBtn').addEventListener('click',goBack);
document.getElementById('reSpinBtn').addEventListener('click',()=>{
  document.getElementById('resCard').classList.remove('show');
  setStep(2);
  setTimeout(doSpin,300);
});

function goBack(){showScreen('screen1');setStep(1);stopTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setStep(n){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('st'+i),sn=document.getElementById('sn'+i);
    el.classList.remove('active','done');
    if(i<n){el.classList.add('done');sn.textContent='✓';}
    else{sn.textContent=i;}
    if(i===n) el.classList.add('active');
  });
}

// Timer
document.querySelectorAll('.tc').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tc').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    tDur=parseInt(b.dataset.t); tRem=tDur; updTimer(); stopTimer();
  });
});
function updTimer(){
  const m=Math.floor(tRem/60),s=tRem%60,el=document.getElementById('tDisp');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('danger',tRem<=10&&tInt);
}
function stopTimer(){
  clearInterval(tInt);tInt=null;tRem=tDur;updTimer();
  document.getElementById('tStart').classList.remove('hidden');
  document.getElementById('tStop').classList.add('hidden');
}
document.getElementById('tStart').addEventListener('click',()=>{
  if(tInt)return;
  document.getElementById('tStart').classList.add('hidden');
  document.getElementById('tStop').classList.remove('hidden');
  tInt=setInterval(()=>{tRem--;updTimer();if(tRem<=0){stopTimer();launchConfetti();}},1000);
});
document.getElementById('tStop').addEventListener('click',stopTimer);
updTimer();

// Scores
function chSc(i,d){scores[i]=Math.max(0,scores[i]+d);document.getElementById('sc'+i).textContent=scores[i];}

// Confetti
const cc=document.getElementById('confettiCanvas'),cctx=cc.getContext('2d');
let conf=[];
function launchConfetti(){
  cc.width=innerWidth;cc.height=innerHeight;
  conf=Array.from({length:140},()=>({
    x:Math.random()*cc.width,y:-20,r:Math.random()*9+4,
    color:['#ff3cac','#ffce00','#00f5d4','#7b2fff','#06d6a0','#ff6b35'][Math.floor(Math.random()*6)],
    vx:(Math.random()-.5)*5,vy:Math.random()*5+2,angle:Math.random()*360,spin:(Math.random()-.5)*8,
  }));
  animConf();
}
function animConf(){
  cctx.clearRect(0,0,cc.width,cc.height);
  conf=conf.filter(p=>p.y<cc.height+30);
  conf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.angle*Math.PI/180);cctx.fillStyle=p.color;cctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.5);cctx.restore();});
  if(conf.length)requestAnimationFrame(animConf);
}
</script>
</body>
</html>
